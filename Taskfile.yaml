---
version: 3
includes:
  git:
    taskfile: https://raw.githubusercontent.com/stuttgart-things/platform-engineering-showcase/refs/heads/main/taskfiles/git.yaml
  go:
    taskfile: https://raw.githubusercontent.com/stuttgart-things/platform-engineering-showcase/refs/heads/main/taskfiles/go-microservice.yaml
vars:
  PROJECT_NAME:
    sh: echo ${PWD##*/}
  ORGA_NAME: stuttgart-things
  MODULE: github.com/{{ .ORGA_NAME }}/{{ .PROJECT_NAME }}
  IMAGE: ghcr.io/{{ .ORGA_NAME }}/{{ .PROJECT_NAME }}

tasks:
  run-lint-and-build:
    desc: Run lint and build stages sequentially for {{ .PROJECT_NAME }}
    cmds:
      - task: run-lint-stage
      - task: run-build-stage
      - task: build-test-binary

  run-lint-stage:
    desc: Run linting stage for {{ .PROJECT_NAME }} using Dagger CI
    cmds:
      - task: go:run-lint-stage
        vars:
          SRC: ./
          TEST: "true"
          GO_VERSION: "1.25.4"
          LINT_CAN_FAIL: "true"
          REPORT_PATH: /tmp/{{ .PROJECT_NAME }}/ci/lint.txt

  run-build-stage:
    desc: Build {{ .PROJECT_NAME }} binary using Go and Ko using Dagger CI
    cmds:
      - task: go:run-build-stage
        vars:
          SRC: ./
          BIN_NAME: "{{ .PROJECT_NAME }}"
          LDFLAGS: ''
          KO_BUILD: "true"
          KO_PUSH: "true"
          KO_REPO: ghcr.io/{{ .ORGA_NAME }}/{{ .PROJECT_NAME }}
          EXPORT_PATH: /tmp/{{ .PROJECT_NAME}}/ci/build.txt

  build-test-binary:
    desc: Build and test binary via Dagger CI
    vars:
      SRC: ./
      FUNCTION: build-and-test-binary
      EXPORT_PATH: /tmp/{{ .PROJECT_NAME}}/ci/build-test.txt
    cmds:
      - |
        dagger call -m dagger \
        build-and-test-binary \
        --source "{{ .SRC }}" \
        export --path={{ .EXPORT_PATH }} \
        --progress plain -vv

  default:
    desc: Default task is select & do (work)
    cmds:
      - task do

  do:
    desc: Select a task to run
    cmds:
      - |
        # Extract task names (keep internal colons, remove only trailing colon)
        task_name=$(task -l | awk '/^\*/ {print $2}' | sed 's/:$//' | gum choose)

        # Run the selected task
        [ -n "$task_name" ] && task "$task_name"

  run-go-tests:
    desc: Run Go tests via Dagger CI
    cmds:
      - |
        dagger call -m {{ .CI_MODULE }} {{ .FUNCTION }} \
        --source {{ .SRC }} \
        --test-path={{ .TEST_PATH }} \
        --go-Version=1.25.4 \
        --progress plain -vv
    vars:
      CI_MODULE: github.com/stuttgart-things/dagger/homerun@v0.42.0
      SRC: ./
      TEST_PATH: .
      FUNCTION: run-test-with-redis

  run-redis-cli:
    desc: Run Redis cli via Dagger
    cmds:
      - |
        dagger call -m github.com/stuttgart-things/dagger/homerun@v0.42.0 redis-cli terminal

  run-redis-as-service:
    desc: Run Redis as service via Dagger
    cmds:
      - |
        dagger call -m github.com/stuttgart-things/dagger/homerun@v0.42.0 run-redis --port {{ .PORT }} --password "{{ .PASSWORD }}" up
    vars:
      PORT: 6379
      PASSWORD: mypass # pragma: allowlist secret

  ci-run-linting:
    desc: Run repository linting via Dagger blueprint
    cmds:
      - |
        dagger call -m {{ .LINTING_MODULE }}@{{ .LINTING_VERSION }} {{ .FUNCTION }} \
        --src {{ .SRC }} \
        --yaml-config-path {{ .YAML_CONFIG_PATH }} \
        --progress plain -vv \
        export --path {{ .REPORT_PATH }}

        cat {{ .REPORT_PATH }}
    vars:
      LINTING_MODULE: github.com/stuttgart-things/blueprints/repository-linting
      LINTING_VERSION: v1.17.0
      SRC: .
      YAML_CONFIG_PATH: ""
      FUNCTION: validate-multiple-technologies
      REPORT_PATH: /tmp/{{ .PROJECT_NAME }}-lint-findings.txt
