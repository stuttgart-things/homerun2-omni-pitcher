apiVersion: apps/v1
kind: Deployment
metadata:
  name: homerun2-omni-pitcher
  labels:
    app: homerun2-omni-pitcher
    app.kubernetes.io/name: homerun2-omni-pitcher
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: homerun2-omni-pitcher
  template:
    metadata:
      labels:
        app: homerun2-omni-pitcher
        app.kubernetes.io/name: homerun2-omni-pitcher
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: homerun2-omni-pitcher
      containers:
      - name: homerun2-omni-pitcher
        image: ghcr.io/stuttgart-things/homerun2-omni-pitcher/homerun2-omni-pitcher-19372b3164b7560205efc0b3c53f43c1@sha256:a5a828d899040e57f116375922f376e73decdc86302e3a9f375077b64d66b711
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: homerun2-omni-pitcher-token
              key: auth-token
        - name: REDIS_ADDR
          value: "redis-stack.homerun2.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: homerun2-omni-pitcher-redis
              key: password
        - name: REDIS_STREAM
          value: "messages"
        envFrom:
        - configMapRef:
            name: homerun2-omni-pitcher-config
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: homerun2-omni-pitcher
              topologyKey: kubernetes.io/hostname
