apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homerun2-omni-pitcher
  labels:
    app: homerun2-omni-pitcher
    app.kubernetes.io/name: homerun2-omni-pitcher
    app.kubernetes.io/component: api
  annotations:
    # Nginx ingress annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Certificate manager
    cert-manager.io/cluster-issuer: "cluster-issuer-approle"
    cert-manager.io/common-name: "homerun2-omni-pitcher.demo-infra.sthings-vsphere.labul.sva.de"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - homerun2-omni-pitcher.demo-infra.sthings-vsphere.labul.sva.de
    secretName: homerun2-omni-pitcher-tls # pragma: allowlist secret
  rules:
  - host: homerun2-omni-pitcher.demo-infra.sthings-vsphere.labul.sva.de
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homerun2-omni-pitcher
            port:
              name: http
